[tox]
isolated_build = true
skipsdist = true
usedevelop = true
envlist = py3-django42

[testenv]
setenv =
    django42: DJANGO_SETTINGS_MODULE = testauth.settings.local
deps=
    django42: allianceauth>=4.0.0
    django42: allianceauth-corptools @ git+https://github.com/Solar-Helix-Independent-Transport/allianceauth-corp-tools.git
    coverage

install_command = pip install -e ".[test]" -U {opts} {packages}

commands=
    coverage run runtests.py moons -v 2 --debug-mode
    pip list
    coverage xml
    coverage html
    coverage report -m
